<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>
        {% block title %}
        Flask Chat
        {% endblock %}
    </title>

</head>
<body>

<div>

    <a href="/">Главная</a>

    {% if current_user.is_authenticated %}

        <span>Пользователь: {{ current_user.name }}</span>

        <a href="/logout">Выйти</a>

    {% else %}

        <a href="/login">Войти</a>

        <a href="/register">Регистрация</a>

    {% endif %}

</div>

<hr>

<div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
