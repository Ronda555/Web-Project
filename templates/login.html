<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Логин</title>
</head>
<body>

<h1>Вход</h1>

{% if message %}
<div>{{ message }}</div>
{% endif %}

<form action="" method="post">

    {{ form.hidden_tag() }}

    <p>
        {{ form.name.label }}<br>
        {{ form.name() }}
    </p>

    <p>
        {{ form.password.label }}<br>
        {{ form.password() }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

</body>
</html>
