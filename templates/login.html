{% extends "base.html" %}

{% block title %}
Вход
{% endblock %}

{% block content %}

<h1>Вход</h1>

{% if message %}
<div>{{ message }}</div>
{% endif %}

<form action="" method="post">

    {{ form.hidden_tag() }}

    <p>
        {{ form.name.label }}<br>
        {{ form.name() }}
    </p>

    <p>
        {{ form.password.label }}<br>
        {{ form.password() }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

{% endblock %}
